services:
  - type: web
    name: lionpride
    runtime: node
    buildCommand: cd client && npm ci && npm run build && cd ../server && npm ci
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lionpride-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: lionpride-db
    databaseName: lionpride
    user: lionpride
