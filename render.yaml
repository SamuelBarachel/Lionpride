services:
  - type: web
    name: lionpride
    runtime: node
    buildCommand: npm run build && cd server && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lionpride-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_BUILD_PATH
        value: ../client/dist

databases:
  - name: lionpride-db
    databaseName: lionpride
    user: lionpride
